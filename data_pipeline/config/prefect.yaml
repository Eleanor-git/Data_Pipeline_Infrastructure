pull:
- prefect.deployments.steps.git_clone:
    repository: https://Eleanor-git@github.com/Eleanor-git/Data_Pipeline_Infrastructure.git
    branch: main
    access_token: null

# the deployments section allows you to provide configuration
# for deploying flows
deployments:
- name: project-deployment
  version: null
  tags:
    - "ETL"
    - "project"
  description: "Data pipeline workflow deployment"
  schedule:
    interval: 120 # Run the flow every 2 minutes
  flow_name: ecommerce_ETL_pipeline
  entrypoint: /Users/eleanor/git_local_repository/Data_Pipeline_Infra/data_pipeline/src/orchestration/prefect_flows.py:process_ecommerce_data
  parameters:
    name: "simple project"
  work_pool:
    name: project-pool
    work_queue_name: null
    job_variables: {}